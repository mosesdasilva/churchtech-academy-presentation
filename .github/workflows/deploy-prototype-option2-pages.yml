name: Deploy Option 2 Prototype to GitHub Pages

on:
  push:
    branches:
      - prototype/option2-mobile-mode
    paths:
      - "prototypes/option2/**"
      - ".github/workflows/deploy-prototype-option2-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-prototype-option2
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload prototype artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: prototypes/option2

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
